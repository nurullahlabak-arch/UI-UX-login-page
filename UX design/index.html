<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - YourBrand</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
 <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wallpaper" aria-hidden="true"></div>

  <main class="login-wrap" aria-label="Login form">
    <section class="login-card" aria-labelledby="login-title">
      <h1 id="login-title" class="brand">YourBrand</h1>

      <form id="loginForm" action="#" method="post" autocomplete="on" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="username" />
          <span class="error" id="emailError" aria-live="polite"></span>
        </div>

        <div class="field password-field">
          <label for="password">Password</label>
          <div class="password-wrap">
            <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password" />
            <button type="button" class="toggle-pw" aria-label="Show password" title="Show password">👁️</button>
          </div>
          <span class="error" id="passwordError" aria-live="polite"></span>
        </div>

        <div class="options">
          <label class="remember">
            <input type="checkbox" id="remember" name="remember" />
            Remember me
          </label>
          <a href="#" class="forgot" aria-label="Forgot password">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary" id="loginBtn">
          <span class="btn-label">Sign in</span>
          <span class="ripple" aria-hidden="true"></span>
        </button>
      </form>

      <p class="signup">
        New here? <a href="#" aria-label="Create account">Create an account</a>
      </p>
    </section>
  </main>

 <script src="main.js"></script>
</body>
</html>
